# BroGourmet — nginx 예시 (Windows·Linux 공통 문법, 경로는 Windows 예시)
#
# [사전 준비]
# 1) Cloudflare DNS: **www** 와 **api** 각각 A(또는 CNAME) → 동일 원본 IP. api 레코드 없으면
#    https://api.2corea.com 은 브라우저에서 아예 안 열림(DNS 실패·다른 서버).
# 2) SSL (없으면 nginx -t 가 `cannot load certificate` / `no such file` 로 실패):
#      mkdir (PowerShell):  New-Item -ItemType Directory -Force -Path 'C:\ProgramData\BroGourmet\ssl'
#      Cloudflare Origin 인증서·키를 **아래 파일명 그대로** 저장(git 금지):
#        C:\ProgramData\BroGourmet\ssl\2corea-origin.pem   (-----BEGIN CERTIFICATE----- …)
#        C:\ProgramData\BroGourmet\ssl\2corea-origin.key (-----BEGIN PRIVATE KEY----- …)
#      다른 폴더에 두면 각 server{} 의 ssl_certificate / ssl_certificate_key 경로만 수정.
# 3) broke: 저장소 루트에서  cd broke && npm ci && npm run build
#    - 프로덕션 빌드 시 .env.production 등으로 VITE_API_BASE_URL=https://api.2corea.com
# 4) gourmet: uvicorn 이 127.0.0.1:8001 에서 대기. gourmet/.env 에 예:
#      BROG_CORS_EXTRA_ORIGINS=https://www.2corea.com
#      FRONTEND_PUBLIC_URL=https://www.2corea.com
# 5) mime.types: 본 디렉터리의 mime.types 를 include (외부 -c conf 사용 시 상대경로가
#    배포 conf 폴더 기준이므로 nginx 설치 경로에 의존하지 않음).
#
# [실행 예 (Windows, 예: C:\nginx-1.29.8)]
#   PowerShell/CMD 모두 nginx 폴더로 cd 후 **.\nginx.exe** 사용 (PS는 nginx.exe 만 쓰면 PATH만 찾음).
#   cd C:\nginx-1.29.8
#   .\nginx.exe -t -c D:/project/brogourmet/deploy/nginx/www-api-2corea.conf
#   .\nginx.exe    -c D:/project/brogourmet/deploy/nginx/www-api-2corea.conf
#   .\nginx.exe -s reload
#
# ※ nginx 는 기본적으로 설치 디렉터리를 prefix 로 쓰므로, -c 로 외부 conf 를 줄 때
#   기본 logs/error.log 가 안 생길 수 있음 → 아래 error_log(저장소 내 절대경로)로 원인 확인.
#   문제 시 conf 를 설치 디렉터리 conf/ 아래로 복사해 사용.

worker_processes  1;
error_log  D:/project/brogourmet/deploy/nginx/nginx-error.log notice;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ---- www: React SPA (broke dist) ----
    server {
        listen              443 ssl;
        server_name         www.2corea.com;

        # www·api 동일 PEM 경로 유지 (경로는 본인 PC에 맞게 한 곳만 수정)
        ssl_certificate     C:/Users/BroGourmet/ssl/2corea-origin.pem;
        ssl_certificate_key C:/Users/BroGourmet/ssl/2corea-origin.key;

        # broke npm run build 출력 디렉터리 (본인 PC 경로로 변경)
        root   D:/project/brogourmet/broke/dist;
        index  index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }

    # ---- api: FastAPI (gourmet) ----
    server {
        listen              443 ssl;
        server_name         api.2corea.com;

        # www 과 동일 PEM
        ssl_certificate     C:/Users/BroGourmet/ssl/2corea-origin.pem;
        ssl_certificate_key C:/Users/BroGourmet/ssl/2corea-origin.key;

        client_max_body_size 32m;

        location / {
            proxy_pass         http://127.0.0.1:8001;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }
}
